name: Sync upstream (microsoft/work-iq)

on:
  schedule:
    # Daily at 19:00 UTC (≈05:00 AEST / 06:00 AEDT)
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync-main:
    name: Fast-forward main from upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/microsoft/work-iq.git

      - name: Fetch upstream
        run: git fetch upstream main --tags

      - name: Fast-forward main
        run: |
          git checkout main
          # Refuse anything other than a clean fast-forward — preserves history integrity.
          git merge --ff-only upstream/main

      - name: Push main
        run: git push origin main --tags

  rebase-lucidlabs-main:
    name: Rebase lucidlabs/main onto upstream/main
    needs: sync-main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: lucidlabs/main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Add upstream remote
        run: git remote add upstream https://github.com/microsoft/work-iq.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Rebase
        id: rebase
        run: |
          set +e
          git rebase upstream/main
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            git rebase --abort
            exit 0
          fi
          echo "conflict=false" >> "$GITHUB_OUTPUT"

      - name: Push (force-with-lease) on clean rebase
        if: steps.rebase.outputs.conflict == 'false'
        run: git push --force-with-lease origin lucidlabs/main

      - name: Open issue on conflict
        if: steps.rebase.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Upstream sync conflict on lucidlabs/main';
            const body = [
              'Automatic rebase of `lucidlabs/main` onto `upstream/main` failed with conflicts.',
              '',
              'Resolve locally:',
              '```bash',
              'git fetch upstream',
              'git checkout lucidlabs/main',
              'git rebase upstream/main',
              '# resolve conflicts, then:',
              'git push --force-with-lease origin lucidlabs/main',
              '```',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync',
            });
            if (existing.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['upstream-sync'],
              });
            }
